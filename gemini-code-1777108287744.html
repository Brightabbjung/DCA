<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Asset DCA (With Auto-Save)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-6xl mx-auto py-10 px-4">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-indigo-600">Multi-Asset DCA</h1>
                <p class="text-slate-500">ข้อมูลจะถูกบันทึกลงในเครื่องของคุณอัตโนมัติ</p>
            </div>
            <button onclick="clearData()" class="text-xs text-red-500 border border-red-200 px-3 py-1 rounded hover:bg-red-50">ล้างข้อมูลทั้งหมด</button>
        </div>
        
        <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
            <div class="xl:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4 flex justify-between items-center">
                        การจัดสรรพอร์ต
                        <button onclick="addStock()" class="text-sm bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full hover:bg-indigo-100 transition">+ เพิ่มสินทรัพย์</button>
                    </h2>
                    
                    <div id="stockList" class="space-y-4"></div>

                    <div class="mt-6 pt-4 border-t border-slate-100">
                        <label class="block text-sm font-bold text-slate-700 mb-1">ระยะเวลารวม (เดือน)</label>
                        <input type="number" id="totalMonths" value="60" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg outline-none">
                    </div>
                    
                    <button onclick="saveAndCalculate()" class="w-full mt-6 bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-bold shadow-lg shadow-indigo-100">
                        คำนวณและบันทึกข้อมูล
                    </button>
                </div>
            </div>

            <div class="xl:col-span-7">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100"><p class="text-xs font-bold text-slate-500 uppercase">เงินต้นรวม</p><p id="resPrincipal" class="text-xl font-black text-slate-800">฿0</p></div>
                        <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100"><p class="text-xs font-bold text-emerald-600 uppercase">กำไรรวม</p><p id="resProfit" class="text-xl font-black text-emerald-700">฿0</p></div>
                        <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100"><p class="text-xs font-bold text-indigo-600 uppercase">มูลค่ารวมพอร์ต</p><p id="resTotal" class="text-xl font-black text-indigo-700">฿0</p></div>
                    </div>
                    <div class="relative h-[400px]"><canvas id="portfolioChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart;
        let stockCount = 0;

        function addStock(name = "", initial = 0, monthly = 5000, rate = 8) {
            stockCount++;
            const div = document.createElement('div');
            div.className = "stock-row p-4 bg-slate-50 rounded-xl border border-slate-200 relative group";
            div.id = `stock-${stockCount}`;
            div.innerHTML = `
                <button onclick="removeStock(${stockCount})" class="absolute -right-2 -top-2 bg-red-100 text-red-600 rounded-full p-1 opacity-0 group-hover:opacity-100 transition"><i data-lucide="x" class="w-4 h-4"></i></button>
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2"><input type="text" placeholder="ชื่อสินทรัพย์" value="${name}" class="stock-name w-full bg-transparent font-bold text-indigo-700 outline-none"></div>
                    <div><label class="text-[10px] uppercase font-bold text-slate-400">เงินก้อนแรก</label><input type="number" value="${initial}" class="stock-initial w-full bg-white border border-slate-200 rounded p-1 text-sm"></div>
                    <div><label class="text-[10px] uppercase font-bold text-slate-400">DCA/เดือน</label><input type="number" value="${monthly}" class="stock-monthly w-full bg-white border border-slate-200 rounded p-1 text-sm"></div>
                    <div class="col-span-2"><label class="text-[10px] uppercase font-bold text-slate-400">ผลตอบแทน (% ต่อปี)</label><input type="number" value="${rate}" step="0.1" class="stock-rate w-full bg-white border border-slate-200 rounded p-1 text-sm"></div>
                </div>
            `;
            document.getElementById('stockList').appendChild(div);
            lucide.createIcons();
        }

        function removeStock(id) {
            document.getElementById(`stock-${id}`).remove();
            saveAndCalculate();
        }

        // ฟังก์ชันบันทึกข้อมูลลง LocalStorage
        function saveAndCalculate() {
            const dataToSave = {
                totalMonths: document.getElementById('totalMonths').value,
                assets: []
            };

            document.querySelectorAll('.stock-row').forEach(row => {
                dataToSave.assets.push({
                    name: row.querySelector('.stock-name').value,
                    initial: row.querySelector('.stock-initial').value,
                    monthly: row.querySelector('.stock-monthly').value,
                    rate: row.querySelector('.stock-rate').value
                });
            });

            localStorage.setItem('dcaPortfolioData', JSON.stringify(dataToSave));
            calculatePortfolio();
        }

        // ฟังก์ชันโหลดข้อมูลเมื่อเปิดเว็บ
        function loadSavedData() {
            const saved = localStorage.getItem('dcaPortfolioData');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('totalMonths').value = data.totalMonths;
                data.assets.forEach(asset => {
                    addStock(asset.name, asset.initial, asset.monthly, asset.rate);
                });
                calculatePortfolio();
            } else {
                // ถ้าไม่มีข้อมูลเก่า ให้สร้างค่าเริ่มต้น
                addStock("หุ้นเทคโนโลยี", 50000, 10000, 12);
                calculatePortfolio();
            }
        }

        function clearData() {
            if(confirm("ต้องการล้างข้อมูลที่บันทึกไว้ทั้งหมดหรือไม่?")) {
                localStorage.removeItem('dcaPortfolioData');
                location.reload();
            }
        }

        function calculatePortfolio() {
            const totalMonths = parseInt(document.getElementById('totalMonths').value) || 0;
            const stockRows = document.querySelectorAll('.stock-row');
            let valTime = new Array(totalMonths + 1).fill(0);
            let priTime = new Array(totalMonths + 1).fill(0);
            
            stockRows.forEach(row => {
                const initial = parseFloat(row.querySelector('.stock-initial').value) || 0;
                const monthly = parseFloat(row.querySelector('.stock-monthly').value) || 0;
                const rate = (parseFloat(row.querySelector('.stock-rate').value) / 100) / 12;

                let curVal = initial; let curPri = initial;
                valTime[0] += curVal; priTime[0] += curPri;

                for (let m = 1; m <= totalMonths; m++) {
                    curPri += monthly;
                    curVal = (curVal + monthly) * (1 + rate);
                    valTime[m] += curVal; priTime[m] += curPri;
                }
            });

            document.getElementById('resPrincipal').innerText = `฿${Math.round(priTime[totalMonths]).toLocaleString()}`;
            document.getElementById('resProfit').innerText = `฿${Math.round(valTime[totalMonths] - priTime[totalMonths]).toLocaleString()}`;
            document.getElementById('resTotal').innerText = `฿${Math.round(valTime[totalMonths]).toLocaleString()}`;

            let labels = []; let cVal = []; let cPri = [];
            const step = totalMonths > 48 ? Math.ceil(totalMonths/10) : 1;
            for (let i = 0; i <= totalMonths; i += step) {
                labels.push(i === 0 ? "เริ่ม" : `ด. ${i}`);
                cVal.push(valTime[i].toFixed(0)); cPri.push(priTime[i].toFixed(0));
            }
            updateChart(labels, cPri, cVal);
        }

        function updateChart(labels, principal, total) {
            const ctx = document.getElementById('portfolioChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'มูลค่าพอร์ตรวม', data: total, borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)', fill: true, tension: 0.3 },
                        { label: 'เงินต้นสะสม', data: principal, borderColor: '#94a3b8', borderDash: [5, 5], fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        window.onload = loadSavedData;
    </script>
</body>
</html>
